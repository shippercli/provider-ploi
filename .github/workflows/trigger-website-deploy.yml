name: Trigger website deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger-website-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger production deploy on Shipper website
        run: |
          if [ -z "${VERCEL_WEBSITE_DEPLOY_HOOK}" ]; then
            echo "Missing secret VERCEL_WEBSITE_DEPLOY_HOOK"
            exit 0
          fi

          curl -fsSL -X POST "${VERCEL_WEBSITE_DEPLOY_HOOK}"
        env:
          VERCEL_WEBSITE_DEPLOY_HOOK: ${{ secrets.VERCEL_WEBSITE_DEPLOY_HOOK }}
